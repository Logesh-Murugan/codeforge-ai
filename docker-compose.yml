version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge
      POSTGRES_DB: codeforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://codeforge:codeforge@db:5432/codeforge
      JWT_SECRET_KEY: your-secret-key-here
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
